<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 rx=%277%27 fill=%27%23179C7D%27/%3E%3Cpath d=%27M8 22 L16 11 L24 22%27 stroke=%27white%27 stroke-width=%273%27 fill=%27none%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27/%3E%3C/svg%3E">
  <meta name="theme-color" content="#0d1714">
  <script>
    // Anti-Flash: setzt data-theme vor dem ersten Rendern, mit demselben
    // twinclimb_theme-Key wie die Landingpage, damit die Wahl erhalten bleibt.
    (function(){
      try{
        var stored = localStorage.getItem('twinclimb_theme');
        var theme = stored === 'light' || stored === 'dark' ? stored :
          ((window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.colorScheme = theme;
      }catch(e){}
    })();
  </script>
  <link rel="alternate" hreflang="en" href="https://fimplank.github.io/twinassessment/workshop.html">
  <link rel="alternate" hreflang="de" href="https://fimplank.github.io/twinassessment/workshop.de.html">
  <title>TwinClimb Workshop</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main-workshop-de.jsx"></script>
</body>
</html>
